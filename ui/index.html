<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AYN Thor Shipping Tracker</title>

<style>
body {
font-family: system-ui;
background: #f5f6f8;
padding: 40px;
}

.container {
max-width: 520px;
margin: auto;
background: white;
padding: 30px;
border-radius: 12px;
box-shadow: 0 10px 20px rgba(0,0,0,0.05);
}

.card {
background: #f8f9fb;
border-radius: 10px;
box-shadow: 0 2px 8px rgba(0,0,0,0.04);
padding: 22px 18px 18px 18px;
margin-bottom: 24px;
}

h1 {
margin-bottom: 10px;
}

.subtitle {
color: #666;
margin-bottom: 20px;
}

select, input, button {
width: 100%;
padding: 10px;
margin-top: 10px;
margin-bottom: 20px;
font-size: 16px;
}

button {
background: black;
color: white;
border: none;
cursor: pointer;
border-radius: 6px;
}

.result {
background: #f5f5f5;
padding: 15px;
border-radius: 8px;
margin-top: 20px;
}

.github-links {
margin-top: 0px;
text-align: center;
}

.github-button {
display:inline-block;
padding:10px 16px;
border-radius:8px;
background:#24292e;
color:white;
text-decoration:none;
font-size:14px;
margin-top:10px;
}

.github-link {
display:block;
margin-top:15px;
font-size:13px;
color:#555;
text-decoration:none;
}

.progress-image {
width: 100%;
height: auto;
max-width: 100%;
border-radius: 8px;
box-shadow: 0 4px 10px rgba(0,0,0,0.05);
margin-top: 10px;
}

</style>

</head>

<body>

<div class="container">

<h1>AYN Thor Shipping Tracker</h1>
<div class="subtitle">
Estimate when your AYN Thor will ship
</div>

<!-- Input Card -->
<div class="card">
    <label>Color</label>
    <select id="color">
        <option>Black</option>
        <option>White</option>
        <option>Rainbow</option>
        <option>Clear Purple</option>
    </select>

    <label>Model</label>
    <select id="model"></select>

    <label>Order Number</label>
    <input
        id="shipment"
        placeholder="xxxx or #ODxxxxxxx"
    />

    <button onclick="check()">Get Estimate</button>

    <div id="result" class="result" style="display:none"></div>
</div>

<!-- Latest Shipments Card -->
<div class="card" id="latest-shipments-section" style="margin-top:0;">
    <h1 style="font-size:1.1em;margin-bottom:10px;">Latest Shipments</h1>
    <div id="latest-shipments-list" style="font-size:15px;color:#222;"></div>
</div>

<!-- Charts and GitHub Card -->
<div class="card">
    <div class="github-links">

        <div class="progress-chart">
        <img
        src="/shipping_progress.png"
        alt="Shipping Progress Chart"
        class="progress-image"
        />
        </div>

        <div style="margin-top:8px;font-size:12px;color:#777;">
        Model updates nightly • Open Source
        </div>

        <a
        class="github-button"
        href="https://github.com/SKCwillie/ayn-thor-tracking"
        target="_blank"
        style="margin-top:20px;"
        >
        ⭐ Star this project on GitHub
        </a>

        <a
        class="github-link"
        href="https://github.com/SKCwillie/ayn-thor-tracking"
        target="_blank"
        >
        View Source Code
        </a>
    </div>
</div>

</div>

<script>
const models = {
"Black": ["Lite","Base","Pro","Max"],
"White": ["Pro","Max"],
"Rainbow": ["Pro","Max"],
"Clear Purple": ["Pro","Max"]
}

const colorSelect = document.getElementById("color")
const modelSelect = document.getElementById("model")

function updateModels() {
const color = colorSelect.value
modelSelect.innerHTML = ""

models[color].forEach(m => {
const opt = document.createElement("option")
opt.value = m
opt.innerText = m
modelSelect.appendChild(opt)
})
}

colorSelect.addEventListener("change", updateModels)

updateModels()

function extractShipmentNumber(rawValue) {

const digitsOnly = rawValue.replace(/\D/g, "")

if (digitsOnly.length < 4) {
return null
}

return digitsOnly.slice(0,4)
}

async function check() {

const color = colorSelect.value.replace(/\s/g,'')
const model = modelSelect.value.replace(/\s/g,'')
const rawShipment = document.getElementById("shipment").value.trim()

const resultEl = document.getElementById("result")

const shipment = extractShipmentNumber(rawShipment)

resultEl.style.display="block"

if (!shipment) {
resultEl.innerHTML =
"Enter a 4 digit order number or full order like #OD1910418"
return
}

const url = `/${color}/${model}/${shipment}`

try {

const res = await fetch(url)
const data = await res.json()

if (!res.ok) {
resultEl.innerHTML = `Error: ${JSON.stringify(data)}`
return
}

resultEl.innerHTML =
`
Predicted Ship Date:<br>
<strong>${data.predicted_ship_date}</strong>
`

} catch(err) {

resultEl.innerHTML = `Request failed: ${err.message}`

}

}

// --- New: Populate Latest Shipments Section ---
async function loadLatestShipments() {
    const section = document.getElementById("latest-shipments-list");
    section.innerHTML = "Loading latest shipments...";
    try {
        const res = await fetch("/latest");
        if (!res.ok) {
            section.innerHTML = "Failed to load latest shipments.";
            return;
        }
        const data = await res.json();
        if (!data.latest_shipments || !Array.isArray(data.latest_shipments)) {
            section.innerHTML = "No latest shipment data available.";
            return;
        }
        let html = "";
        data.latest_shipments.forEach(colorGroup => {
            html += `<div style="margin-top:12px;"><strong>${colorGroup.color}</strong><ul style="margin:4px 0 8px 18px;padding:0;">`;
            colorGroup.models.forEach(model => {
                html += `<li><b>${model.model}</b>: ${model.latest_order}</li>`;
            });
            html += "</ul></div>";
        });
        section.innerHTML = html;
    } catch (e) {
        section.innerHTML = "Error loading latest shipments.";
    }
}
window.addEventListener("DOMContentLoaded", loadLatestShipments);
</script>

</body>
</html>
