<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AYN Thor Shipping Tracker</title>

<style>
body {
font-family: system-ui;
background: #f5f6f8;
padding: 40px;
}

.container {
max-width: 520px;
margin: auto;
background: white;
padding: 30px;
border-radius: 12px;
box-shadow: 0 10px 20px rgba(0,0,0,0.05);
}

h1 {
margin-bottom: 10px;
}

.subtitle {
color: #666;
margin-bottom: 20px;
}

select, input, button {
width: 100%;
padding: 10px;
margin-top: 10px;
margin-bottom: 20px;
font-size: 16px;
}

button {
background: black;
color: white;
border: none;
cursor: pointer;
border-radius: 6px;
}

.result {
background: #f5f5f5;
padding: 15px;
border-radius: 8px;
margin-top: 20px;
}

.github-links {
margin-top: 30px;
text-align: center;
}

.github-button {
display:inline-block;
padding:10px 16px;
border-radius:8px;
background:#24292e;
color:white;
text-decoration:none;
font-size:14px;
margin-top:10px;
}

.github-link {
display:block;
margin-top:15px;
font-size:13px;
color:#555;
text-decoration:none;
}

</style>

</head>

<body>

<div class="container">

<h1>AYN Thor Shipping Tracker</h1>
<div class="subtitle">
Estimate when your AYN Thor will ship
</div>

<label>Color</label> <select id="color">

<option>Black</option>
<option>White</option>
<option>Rainbow</option>
<option>Clear Purple</option>
</select>

<label>Model</label> <select id="model"></select>

<label>Order Number</label> <input
id="shipment"
placeholder="xxxx or #ODxxxxxxx"
/>

<button onclick="check()">Get Estimate</button>

<div id="result" class="result" style="display:none"></div>

<div class="github-links">

<a
class="github-button"
href="https://github.com/SKCwillie/ayn-thor-tracking"
target="_blank"

>

⭐ Star this project on GitHub </a>

<a
class="github-link"
href="https://github.com/SKCwillie/ayn-thor-tracking"
target="_blank"

>

View Source Code </a>
    <div class="progress-chart">
<h3>Shipping Progress</h3>
<img
src="/shipping_progress.png"
alt="Shipping Progress Chart"
class="progress-image"
/>
</div>

<div style="margin-top:8px;font-size:12px;color:#777;">
Model updates nightly • Open Source
</div>

</div>

</div>

<script>

const models = {
"Black": ["Lite","Base","Pro","Max"],
"White": ["Pro","Max"],
"Rainbow": ["Pro","Max"],
"Clear Purple": ["Pro","Max"]
}

const colorSelect = document.getElementById("color")
const modelSelect = document.getElementById("model")

function updateModels() {
const color = colorSelect.value
modelSelect.innerHTML = ""

models[color].forEach(m => {
const opt = document.createElement("option")
opt.value = m
opt.innerText = m
modelSelect.appendChild(opt)
})
}

colorSelect.addEventListener("change", updateModels)

updateModels()

function extractShipmentNumber(rawValue) {

const digitsOnly = rawValue.replace(/\D/g, "")

if (digitsOnly.length < 4) {
return null
}

return digitsOnly.slice(0,4)
}

async function check() {

const color = colorSelect.value.replace(/\s/g,'')
const model = modelSelect.value.replace(/\s/g,'')
const rawShipment = document.getElementById("shipment").value.trim()

const resultEl = document.getElementById("result")

const shipment = extractShipmentNumber(rawShipment)

resultEl.style.display="block"

if (!shipment) {
resultEl.innerHTML =
"Enter a 4 digit order number or full order like #OD1910418"
return
}

const url = `/${color}/${model}/${shipment}`

try {

const res = await fetch(url)
const data = await res.json()

if (!res.ok) {
resultEl.innerHTML = `Error: ${JSON.stringify(data)}`
return
}

resultEl.innerHTML =
`
Predicted Ship Date:<br>
<strong>${data.predicted_ship_date}</strong>
`

} catch(err) {

resultEl.innerHTML = `Request failed: ${err.message}`

}

}

</script>

</body>
</html>
